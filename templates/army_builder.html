<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Army Builder · Codex Armorum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=EB+Garamond:ital@0;1&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    /* ---- Army Builder specific styles ---- */
    .ab-topbar-extra { display:flex; align-items:center; gap:16px; }
    .ab-back { font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:1.5px; text-transform:uppercase;
      color:var(--parch-dim); text-decoration:none; transition:color .2s; }
    .ab-back:hover { color:var(--gold); }

    /* Army list grid */
    .army-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:18px; margin-top:20px; }
    .army-tile {
      border:2px solid var(--cardarmy,var(--edge)); padding:18px; cursor:pointer;
      transition:border-color .2s,transform .2s,box-shadow .2s; position:relative; overflow:hidden;
    }
    .army-tile::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; z-index:2;
      background:var(--at-accent,var(--gold)); }
    .army-tile:hover { border-color:var(--cardarmy,var(--gold)); transform:translateY(-3px); box-shadow:0 14px 36px rgba(0,0,0,.55),0 0 0 1px var(--at-accent,var(--gold)); }
    .army-tile-mark { left:82%; top:48%; width:220px; opacity:.16; }
    .army-tile:hover .army-tile-mark { opacity:.26; }
    .army-tile-name { font-family:'Cinzel',serif; font-weight:700; font-size:16px; color:#f3ead5; margin:0 0 4px; text-shadow:0 2px 8px rgba(0,0,0,.92); }
    .army-tile-meta { font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:.5px; color:var(--gold); margin:0 0 10px; text-shadow:0 2px 8px rgba(0,0,0,.92); }
    .army-tile-pts { font-family:'Oswald',sans-serif; font-size:13px; color:var(--parch-dim); text-shadow:0 2px 8px rgba(0,0,0,.92); }
    .army-tile-pts b { color:var(--gold-bright); }
    .army-tile-del { position:absolute; top:10px; right:10px; background:none; border:none;
      color:var(--parch-dim); font-size:18px; cursor:pointer; line-height:1; opacity:.4; transition:opacity .2s,color .2s; }
    .army-tile-del:hover { opacity:1; color:var(--blood-bright); }

    .new-army-btn {
      display:flex; align-items:center; justify-content:center; gap:8px;
      background:transparent; border:1px dashed rgba(199,154,58,.4); color:var(--gold);
      font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:1px; text-transform:uppercase;
      padding:18px; cursor:pointer; width:100%; transition:all .2s; margin-top:18px;
    }
    .new-army-btn:hover { background:rgba(199,154,58,.05); border-color:rgba(199,154,58,.7); }

    /* Create army form */
    .create-army-form { background:var(--ink-2); border:1px solid rgba(199,154,58,.4); padding:20px; margin-top:18px; }
    .create-army-form h3 { font-family:'Cinzel',serif; color:var(--gold-bright); margin:0 0 16px; font-size:15px; letter-spacing:1px; }
    .caf-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media(max-width:600px){.caf-grid{grid-template-columns:1fr;}}
    .caf-field { display:flex; flex-direction:column; gap:5px; }
    .caf-field label { font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--gold); opacity:.85; }
    .caf-field select, .caf-field input[type=number], .caf-field input[type=text] {
      background:var(--panel); border:1px solid var(--edge); color:var(--parch);
      font-family:'EB Garamond',serif; font-size:15px; padding:8px 12px; transition:border-color .2s;
    }
    .caf-field select:focus, .caf-field input:focus { outline:none; border-color:rgba(199,154,58,.6); }
    .caf-field select option { background:var(--panel); }

    /* Army detail layout */
    .ab-detail { display:grid; grid-template-columns:300px 1fr; gap:28px; align-items:start; }
    @media(max-width:900px){ .ab-detail { grid-template-columns:1fr; } }
    .ab-sidebar { position:sticky; top:80px; }
    @media(max-width:900px){ .ab-sidebar { position:static; } }

    /* ---- Three-panel army builder layout ---- */
    .ab-detail.ab-3panel { grid-template-columns:270px minmax(0,1fr) 340px; gap:18px; }
    @media(max-width:1180px){ .ab-detail.ab-3panel { grid-template-columns:240px minmax(0,1fr) 300px; gap:12px; } }
    @media(max-width:900px){ .ab-detail.ab-3panel { grid-template-columns:1fr; } }
    .ab-leftpanel, .ab-rightpanel { position:sticky; top:80px; max-height:calc(100vh - 96px); display:flex; flex-direction:column; }
    .ab-leftpanel { background:var(--panel); border:1px solid var(--edge); overflow:hidden; }
    .ab-rightpanel { background:linear-gradient(160deg,var(--panel-2),var(--panel)); border:1px solid var(--edge); overflow:hidden; }
    .ab-centre { min-width:0; }
    .ab-rp-scrim { display:none; position:fixed; inset:0; z-index:65; background:rgba(5,5,7,.7); opacity:0; pointer-events:none; transition:opacity .3s ease; }
    @media(max-width:900px){
      .ab-rp-scrim { display:block; }
      .ab-rp-scrim.is-open { opacity:1; pointer-events:auto; }
      .ab-rightpanel { position:fixed; left:0; right:0; top:auto; bottom:0; max-height:86vh; z-index:70;
        border-radius:18px 18px 0 0; border-top:1px solid var(--gold); box-shadow:0 -22px 50px rgba(0,0,0,.55);
        transform:translateY(100%); transition:transform .34s cubic-bezier(.16,1,.3,1); }
      .ab-rightpanel::before { content:""; display:block; flex-shrink:0; width:38px; height:4px; border-radius:2px; background:rgba(199,154,58,.4); margin:9px auto 2px; }
      .ab-rightpanel.is-open { transform:translateY(0); }
      .ab-rightpanel:has(.ab-rp-empty) { display:none; }
    }

    /* Left panel: persistent unit picker */
    .lp-head { padding:12px 12px 10px; border-bottom:1px solid var(--edge); }
    .lp-title { font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin:0 0 8px; }
    .lp-search { width:100%; background:var(--ink-2); border:1px solid var(--edge); color:var(--parch); font-family:'EB Garamond',serif; font-size:14px; padding:6px 10px; }
    .lp-search:focus { outline:none; border-color:rgba(199,154,58,.5); }
    .lp-body { overflow-y:auto; flex:1; }
    .lp-loading, .lp-empty { padding:18px; color:var(--parch-dim); font-style:italic; font-size:13px; }
    .lp-role { font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); opacity:.65; padding:9px 12px 3px; position:sticky; top:0; background:var(--panel); display:flex; justify-content:space-between; z-index:1; }
    .lp-role-ally { color:var(--blood-bright); border-top:1px solid rgba(150,40,40,.3); }
    .lp-role-n { opacity:.6; }
    .lp-unit { display:flex; align-items:center; gap:8px; padding:6px 12px; cursor:pointer; border-bottom:1px solid rgba(44,42,53,.4); transition:background .12s; }
    .lp-unit:hover { background:rgba(199,154,58,.06); }
    .lp-add { flex-shrink:0; width:20px; height:20px; border-radius:50%; border:1px solid rgba(199,154,58,.5); background:none; color:var(--gold); font-size:15px; line-height:1; cursor:pointer; transition:.12s; padding:0; }
    .lp-unit:hover .lp-add { background:var(--gold); color:#0a0a0c; }
    .lp-unit-name { flex:1; min-width:0; font-family:'Cinzel',serif; font-weight:700; font-size:12px; color:var(--parch); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lp-used { flex-shrink:0; font-family:'Oswald',sans-serif; font-size:10px; color:var(--gold-bright); background:rgba(0,0,0,.3); border-radius:8px; padding:0 6px; }
    .lp-pts { flex-shrink:0; font-family:'Oswald',sans-serif; font-size:11px; color:var(--gold-bright); }

    /* Centre panel header + config rows */
    .ab-centre-head { display:flex; align-items:center; gap:14px; margin-bottom:12px; flex-wrap:wrap; }
    .ab-centre-head .ab-name-input { flex:1; min-width:180px; font-size:22px; }
    .ab-centre-meters { margin-bottom:18px; }
    .ab-config { display:flex; flex-direction:column; gap:6px; margin-bottom:18px; }
    .ab-cfg-row { display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:var(--panel); border:1px solid var(--edge); border-left:3px solid var(--gold); padding:10px 14px; cursor:pointer; transition:.15s; }
    .ab-cfg-row:hover { border-left-color:var(--gold-bright); background:rgba(199,154,58,.04); }
    .ab-cfg-row.is-active { border-left-color:var(--gold-bright); background:rgba(199,154,58,.08); }
    .ab-cfg-label { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--gold); opacity:.8; min-width:90px; }
    .ab-cfg-value { flex:1; font-family:'EB Garamond',serif; font-size:15px; color:var(--parch); }
    .ab-cfg-dp { font-family:'Oswald',sans-serif; font-size:11px; color:var(--gold-bright); font-style:normal; margin-left:6px; }
    .ab-cfg-empty { color:var(--parch-dim); font-style:italic; }
    .ab-cfg-chev { color:var(--gold); opacity:.6; }

    /* Right panel: context detail */
    .ab-rp-empty { padding:40px 20px; text-align:center; color:var(--parch-dim); }
    .ab-rp-empty-icon { display:block; font-size:30px; color:var(--gold); opacity:.3; margin-bottom:10px; }
    .ab-rp-empty p { font-style:italic; font-size:13px; line-height:1.5; margin:0; }
    .ab-rp-head { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 16px; border-bottom:1px solid var(--edge); }
    .ab-rp-title { font-family:'Cinzel',serif; font-weight:700; font-size:15px; color:var(--gold-bright); margin:0; line-height:1.3; }
    .ab-rp-close { background:none; border:none; color:var(--parch-dim); font-size:22px; line-height:1; cursor:pointer; transition:color .2s; padding:0; }
    .ab-rp-close:hover { color:var(--gold); }
    .ab-rp-body { overflow-y:auto; padding:14px 16px; }
    .ab-rp-pts { font-family:'Oswald',sans-serif; font-size:14px; color:var(--parch-dim); margin-bottom:12px; }
    .ab-rp-pts b { color:var(--gold-bright); }
    .ab-rp-role { text-transform:uppercase; letter-spacing:.5px; font-size:11px; }
    .ab-rp-btn { display:inline-block; background:none; border:1px solid var(--edge); color:var(--gold); font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:.5px; text-transform:uppercase; padding:6px 12px; cursor:pointer; transition:.15s; margin-bottom:12px; }
    .ab-rp-btn:hover { border-color:var(--gold); color:var(--gold-bright); }
    .ab-rp-btn.is-on { background:var(--gold); color:#0a0a0c; border-color:var(--gold); }
    .ab-rp-section { border-top:1px solid rgba(44,42,53,.6); padding-top:12px; margin-top:12px; }
    .ab-rp-sec-head { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); opacity:.7; margin-bottom:8px; }
    .ab-rp-hint { font-family:'EB Garamond',serif; font-size:13px; color:var(--parch-dim); font-style:italic; margin:0 0 8px; }
    .ab-rp-select { width:100%; background:var(--panel); border:1px solid var(--edge); color:var(--parch); font-family:'EB Garamond',serif; font-size:14px; padding:7px 10px; }
    .ab-rp-select:focus { outline:none; border-color:rgba(199,154,58,.5); }
    /* The right panel reuses the wargear/enhancement editor markup; drop their old
       inline framing so they sit flush inside the panel. */
    .ab-rp-body .au-wargear-editor, .ab-rp-body .au-enh-editor { margin-top:0; border:none; padding:0; background:none; }

    /* Profiles (statline + weapon) tables in the right panel */
    .ab-rp-collapse { display:flex; align-items:center; justify-content:space-between; width:100%; background:none; border:none; cursor:pointer; padding:0; }
    .ab-rp-collapse-chev { color:var(--gold); font-size:11px; }
    .wp-grp { font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--gold); opacity:.7; margin:12px 0 4px; }
    .wp-table { width:100%; border-collapse:collapse; margin-top:6px; font-family:'Oswald',sans-serif; font-size:11px; }
    .wp-table th { font-weight:400; letter-spacing:.5px; text-transform:uppercase; color:var(--gold); opacity:.6; text-align:center; padding:3px 4px; border-bottom:1px solid var(--edge); }
    .wp-table td { text-align:center; padding:4px; color:var(--parch); border-bottom:1px solid rgba(44,42,53,.4); }
    .wp-table td.wp-nm { text-align:left; font-family:'EB Garamond',serif; font-size:13px; color:var(--parch); }
    .wp-kw { display:block; font-family:'Oswald',sans-serif; font-size:9px; letter-spacing:.4px; text-transform:uppercase; color:var(--parch-dim); }

    /* Roster unit row: clickable selection + edit affordance */
    .au-row { cursor:pointer; }
    .au-row.is-selected { border-color:var(--gold); box-shadow:inset 0 0 0 1px var(--gold); }
    .au-edit-hint { font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--parch-dim); }
    .au-row:hover .au-edit-hint { color:var(--gold); }

    /* Detachment chip: stacked name + Force Disposition label */
    .ab-detach-chip-main { display:flex; flex-direction:column; gap:2px; flex:1; min-width:0; }
    .ab-detach-chip-disp { font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:.5px; text-transform:uppercase; color:var(--parch-dim); }

    /* Mobile: left picker becomes a drawer */
    .ab-mobile-units-btn { display:none; }
    @media(max-width:900px){
      .ab-mobile-units-btn { display:block; position:fixed; bottom:16px; left:16px; z-index:40; background:var(--gold); color:#0a0a0c; border:none; font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:1px; text-transform:uppercase; padding:10px 16px; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,.5); }
      .ab-leftpanel { position:fixed; left:0; top:0; bottom:0; width:280px; max-width:85vw; z-index:60; transform:translateX(-100%); transition:transform .25s; box-shadow:0 0 40px rgba(0,0,0,.6); max-height:none; }
      .ab-leftpanel.is-open { transform:translateX(0); }
    }

    /* Sidebar card */
    .ab-card { background:linear-gradient(160deg,var(--panel-2),var(--panel)); border:1px solid var(--edge); padding:18px; margin-bottom:14px; }
    .ab-card-title { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:2px; text-transform:uppercase;
      color:var(--gold); opacity:.7; margin:0 0 12px; }
    .ab-name-input { width:100%; background:transparent; border:none; border-bottom:1px solid rgba(199,154,58,.4);
      color:var(--parch); font-family:'Cinzel',serif; font-weight:700; font-size:18px; padding:4px 0;
      transition:border-color .2s; }
    .ab-name-input:focus { outline:none; border-bottom-color:var(--gold); }
    .ab-meta-row { display:flex; flex-direction:column; gap:10px; margin-top:14px; }
    .ab-meta-item { display:flex; flex-direction:column; gap:4px; }
    .ab-meta-item label { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--gold); opacity:.7; }
    .ab-meta-item select, .ab-meta-item input[type=number] {
      background:var(--ink-2); border:1px solid var(--edge); color:var(--parch);
      font-family:'EB Garamond',serif; font-size:15px; padding:6px 10px;
    }
    .ab-meta-item select:focus, .ab-meta-item input:focus { outline:none; border-color:rgba(199,154,58,.5); }

    /* Points bar */
    .pts-bar-wrap { margin-top:0; }
    .pts-bar-nums { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
    .pts-used { font-family:'Oswald',sans-serif; font-size:26px; font-weight:600; color:var(--gold-bright); line-height:1; }
    .pts-used.is-over { color:var(--blood-bright); }
    .pts-limit-label { font-family:'Oswald',sans-serif; font-size:12px; color:var(--parch-dim); letter-spacing:.5px; }
    .pts-bar-track { height:6px; background:rgba(44,42,53,.8); position:relative; }
    .pts-bar-fill { height:100%; background:var(--gold); transition:width .3s ease; max-width:100%; }
    .pts-bar-fill.is-over { background:var(--blood-bright); }
    .pts-over-msg { font-family:'Oswald',sans-serif; font-size:11px; color:var(--blood-bright); letter-spacing:.5px; margin-top:5px; }

    /* Validation block in sidebar */
    .ab-validation { margin-top:0; }
    .ab-val-row { font-family:'EB Garamond',serif; font-size:13px; padding:3px 0;
      display:flex; align-items:flex-start; gap:6px; line-height:1.4; }
    .ab-val-ok  { color:var(--good); }
    .ab-val-err { color:var(--blood-bright); }
    .ab-val-warn{ color:#c89a3a; }
    .ab-val-info{ color:var(--parch-dim); }

    /* Detachment rule card (collapsible) */
    .ab-detrule-card { padding:0; }
    .ab-detrule-toggle { width:100%; display:flex; align-items:center; justify-content:space-between;
      gap:10px; background:none; border:none; cursor:pointer; padding:16px 18px; text-align:left; }
    .ab-detrule-toggle:hover .ab-detrule-chevron { color:var(--gold-bright); }
    .ab-detrule-chevron { color:var(--gold); font-size:12px; }
    .ab-detrule-content { padding:0 18px 16px; border-top:1px solid rgba(44,42,53,.6); }
    .ab-detrule { padding-top:12px; }
    .ab-detrule + .ab-detrule { margin-top:10px; border-top:1px dashed rgba(44,42,53,.5); padding-top:10px; }
    .ab-detrule-name { font-family:'Cinzel',serif; font-weight:700; font-size:13px; color:var(--gold-bright);
      margin-bottom:4px; letter-spacing:.3px; }
    .ab-detrule-body { font-family:'EB Garamond',serif; font-size:14px; line-height:1.5; color:var(--parch);
      white-space:pre-wrap; }
    .ab-detrule-meta { margin-top:12px; padding-top:10px; border-top:1px solid rgba(44,42,53,.6); }
    .ab-detlist { font-family:'EB Garamond',serif; font-size:13px; color:var(--parch-dim); line-height:1.5; }
    .ab-detlist + .ab-detlist { margin-top:4px; }
    .ab-detlist-label { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase;
      color:var(--gold); opacity:.85; }

    /* Detachment Points panel (multi-detachment selection) */
    .ab-detach-head { display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:12px; }
    .ab-dp-budget { font-family:'Oswald',sans-serif; font-size:13px; font-weight:600; letter-spacing:.5px;
      color:var(--gold-bright); white-space:nowrap; }
    .ab-dp-budget.is-over { color:var(--blood-bright); }
    .ab-detach-list { display:flex; flex-direction:column; gap:7px; margin-bottom:10px; }
    .ab-detach-empty { font-family:'EB Garamond',serif; font-size:13px; font-style:italic; color:var(--parch-dim); }
    .ab-detach-chip { display:flex; align-items:center; gap:8px; background:var(--ink-2);
      border:1px solid var(--edge); border-left:3px solid var(--gold); padding:7px 10px; }
    .ab-detach-chip-name { font-family:'Cinzel',serif; font-weight:700; font-size:13px; color:var(--parch);
      flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .ab-detach-chip-cost { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:.5px; color:var(--gold);
      border:1px solid var(--edge); border-radius:3px; padding:1px 6px; white-space:nowrap; }
    .ab-detach-chip-x { background:none; border:none; color:var(--parch-dim); font-size:18px; line-height:1;
      cursor:pointer; padding:0 2px; transition:color .2s; }
    .ab-detach-chip-x:hover { color:var(--blood-bright); }
    .ab-detach-add { width:100%; background:var(--ink-2); border:1px solid var(--edge); color:var(--parch);
      font-family:'EB Garamond',serif; font-size:14px; padding:7px 10px; cursor:pointer; }
    .ab-detach-add:focus { outline:none; border-color:rgba(199,154,58,.5); }
    .ab-detach-add option { background:var(--panel); }

    /* Army-rule + stratagem cards (reuse the detachment-card collapsible shell) */
    .ab-count { display:inline-block; min-width:16px; padding:0 6px; margin-left:6px; border-radius:9px;
      background:rgba(0,0,0,.28); color:var(--gold-bright); font-family:'Oswald',sans-serif; font-size:11px; text-align:center; }
    .ab-strat-card .ab-detrule-content { padding-top:4px; }
    .ab-strat-group + .ab-strat-group { margin-top:14px; }
    .ab-strat-grouphead { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
      color:var(--gold); opacity:.7; margin:12px 0 6px; }
    .ab-strat { padding:8px 0; border-top:1px dashed rgba(44,42,53,.5); }
    .ab-strat-group .ab-strat:first-of-type { border-top:none; }
    .ab-strat-head { display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
    .ab-strat-name { font-family:'Cinzel',serif; font-weight:700; font-size:13px; color:var(--gold-bright); }
    .ab-strat-cp { font-family:'Oswald',sans-serif; font-size:11px; color:var(--gold); white-space:nowrap;
      border:1px solid var(--edge); border-radius:3px; padding:1px 6px; }
    .ab-strat-cat { font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:1px; text-transform:uppercase;
      color:var(--parch-dim); margin:2px 0 4px; }
    .ab-strat-line { font-family:'EB Garamond',serif; font-size:13px; line-height:1.45; color:var(--parch);
      white-space:pre-wrap; margin-top:3px; }

    /* The [hidden] UA default (display:none) loses to the flex display on these
       field wrappers, so restore it with a higher-specificity rule. */
    .caf-field[hidden], .ab-meta-item[hidden] { display:none; }

    /* Unit roster */
    .ab-roster-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .ab-roster-title { font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin:0; }
    .add-unit-btn { background:var(--gold); color:#0a0a0c; border:none; font-family:'Oswald',sans-serif;

    .role-section { margin-bottom:24px; }

      color:var(--gold); opacity:.6; margin:0 0 10px; display:flex; align-items:center; gap:10px; }
    .role-section-head::after { content:""; flex:1; height:1px; background:linear-gradient(90deg,var(--edge),transparent); }
    .role-count { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; color:var(--gold);

    .ab-export-btns { display:flex; flex-wrap:wrap; gap:8px; }
    .ab-export-btn { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase;
      color:var(--gold); background:none; border:1px solid var(--edge); padding:7px 12px; cursor:pointer; transition:.15s; }
    .ab-export-btn:hover { color:var(--gold-bright); border-color:var(--gold); }
    .new-army-btn--ghost { background:none; color:var(--gold); border:1px solid var(--edge); margin-top:10px; }
    .new-army-btn--ghost:hover { border-color:var(--gold); color:var(--gold-bright); }

    .au-row {
      border:1px solid var(--edge); border-left:3px solid var(--au-accent,var(--gold));
      padding:12px 14px; margin-bottom:8px; display:grid;
      grid-template-columns:1fr auto; gap:10px; align-items:start;
    }
    .au-row.faction-surface { border-color:color-mix(in srgb,var(--cardarmy,var(--edge)) 65%,var(--edge)); border-left-color:var(--au-accent,var(--gold)); }
    .au-name { font-family:'Cinzel',serif; font-weight:700; font-size:14px; color:var(--parch); margin:0 0 4px; }
    .au-role { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--gold); opacity:.6; margin:0 0 8px; }
    .au-comp { font-family:'EB Garamond',serif; font-size:13px; color:var(--parch-dim); margin:0 0 8px; line-height:1.4; }
    .au-comp:empty { display:none; }
    .au-controls { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .au-size-wrap { display:flex; align-items:center; gap:8px; }
    .au-size-wrap label { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:.5px; text-transform:uppercase; color:var(--parch-dim); }
    .au-size-input { width:70px; background:var(--ink-2); border:1px solid var(--edge); color:var(--parch);
      font-family:'Oswald',sans-serif; font-size:15px; padding:4px 8px; text-align:center; }
    .au-size-input:focus { outline:none; border-color:rgba(199,154,58,.5); }
    .au-pts { font-family:'Oswald',sans-serif; font-size:15px; color:var(--gold-bright); white-space:nowrap; }
    .au-ownership { font-family:'EB Garamond',serif; font-size:14px; margin-top:4px; }
    .own-ok   { color:var(--good); }
    .own-warn { color:#c89a3a; }
    .own-none { color:var(--parch-dim); font-style:italic; }
    .au-assign-wrap { display:flex; align-items:center; gap:6px; }
    .au-assign-wrap label { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:.5px; text-transform:uppercase; color:var(--parch-dim); }
    .au-assign-input { width:60px; background:var(--ink-2); border:1px solid var(--edge); color:var(--parch);
      font-family:'Oswald',sans-serif; font-size:14px; padding:3px 7px; text-align:center; }
    .au-assign-input:focus { outline:none; border-color:rgba(199,154,58,.5); }
    .au-enh { font-family:'EB Garamond',serif; font-size:13px; color:var(--gold); margin-top:4px; font-style:italic; }
    .au-actions { display:flex; flex-direction:column; gap:6px; align-items:flex-end; padding-top:2px; }
    .au-del { background:none; border:1px solid rgba(44,42,53,.6); color:var(--parch-dim); font-family:'Oswald',sans-serif;
      font-size:11px; letter-spacing:.5px; text-transform:uppercase; padding:4px 8px; cursor:pointer; transition:all .2s; white-space:nowrap; }
    .au-del:hover { border-color:var(--blood-bright); color:var(--blood-bright); }
    .au-enh-btn { background:none; border:none; color:var(--parch-dim); font-family:'Oswald',sans-serif;
      font-size:11px; letter-spacing:.5px; text-transform:uppercase; cursor:pointer; text-decoration:underline;
      text-underline-offset:2px; transition:color .2s; padding:0; white-space:nowrap; }
    .au-enh-btn:hover { color:var(--gold); }
    .au-warlord-btn.is-on { color:var(--gold-bright); text-decoration:none; }
    .au-warlord { color:var(--gold-bright); font-size:13px; margin-left:4px; text-shadow:0 0 6px rgba(199,154,58,.5); }
    .au-ledby { font-family:'EB Garamond',serif; font-style:italic; font-size:12px; color:var(--gold); margin-left:6px; }
    .au-ally { font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:.5px; text-transform:uppercase; color:var(--blood-bright);
      border:1px solid rgba(150,40,40,.5); border-radius:2px; padding:1px 5px; margin-left:6px; }
    .au-nested { margin-left:26px; border-left:2px solid rgba(199,154,58,.35); padding-left:8px; margin-top:-2px; }
    .au-attach { background:var(--panel); border:1px solid var(--edge); color:var(--parch-dim);
      font-family:'Oswald',sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:.4px; padding:2px 4px; cursor:pointer; }
    .au-attach:focus { outline:none; border-color:rgba(199,154,58,.5); }
    .au-wargear-editor { grid-column:1/-1; background:var(--ink-2); border:1px solid rgba(44,42,53,.7); padding:12px 14px; margin-top:6px; }
    .wg-summary { font-family:'EB Garamond',serif; font-size:13px; color:var(--parch); margin-bottom:12px; font-style:italic; line-height:1.4; }
    .wg-group { margin-bottom:12px; }
    .wg-group:last-child { margin-bottom:0; }
    .wg-group-head { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:.5px; text-transform:uppercase; color:var(--gold); opacity:.7; margin-bottom:5px; }
    .wg-group.wg-default { font-family:'EB Garamond',serif; font-size:13px; color:var(--parch-dim); }
    .wg-default-lbl { font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--gold); opacity:.6; margin-right:5px; }
    .wg-fixed { display:flex; align-items:center; gap:8px; font-family:'EB Garamond',serif; font-size:14px; color:var(--parch-dim); padding:3px 0; }
    .wg-fixed input { accent-color:var(--gold); flex-shrink:0; }
    .wg-radio { display:flex; align-items:center; gap:8px; font-family:'EB Garamond',serif; font-size:14px; color:var(--parch); padding:3px 0; cursor:pointer; }
    .wg-radio .wg-box-input { position:absolute; opacity:0; width:14px; height:14px; margin:0; pointer-events:none; }
    .wg-radio .wg-box { width:14px; height:14px; border:1px solid var(--edge); border-radius:2px; background:var(--panel);
      flex-shrink:0; position:relative; }
    .wg-radio .wg-box-input:checked + .wg-box { background:var(--gold); border-color:var(--gold); }
    .wg-radio .wg-box-input:checked + .wg-box::after { content:''; position:absolute; left:4px; top:1px; width:4px; height:8px;
      border:solid var(--ink); border-width:0 2px 2px 0; transform:rotate(45deg); }
    .wg-radio .wg-box-input:focus-visible + .wg-box { outline:2px solid var(--gold-bright); outline-offset:1px; }
    .wg-check { display:flex; align-items:center; gap:8px; font-family:'EB Garamond',serif; font-size:14px; color:var(--parch); padding:3px 0; cursor:pointer; }
    .wg-check input { accent-color:var(--gold); flex-shrink:0; }
    @keyframes wgShimmer { 0%{background-position:220% 0;} 100%{background-position:-20% 0;} }
    .wg-card { border:1px solid var(--edge); background:radial-gradient(circle at 16% 0%,rgba(199,154,58,.08),transparent 55%),var(--panel); margin-bottom:10px; }
    .wg-card-icon { color:var(--gold); display:inline-flex; margin-right:7px; vertical-align:-2px; }
    .wg-card-tag { font-family:'Oswald',sans-serif; font-size:9.5px; letter-spacing:.5px; text-transform:uppercase; color:var(--gold); background:rgba(199,154,58,.12); border:1px solid rgba(199,154,58,.3); border-radius:8px; padding:1px 6px; margin-left:8px; }
    .wg-violation { display:flex; flex-direction:column; gap:3px; font-family:'EB Garamond',serif; font-size:13px; color:#c89a3a; background:rgba(199,154,58,.07); border:1px solid rgba(199,154,58,.35); border-left:3px solid var(--gold); border-radius:4px; padding:8px 10px; margin-bottom:10px; }
    .au-wargear-editor.is-pending { position:relative; opacity:.85; pointer-events:none; }
    .au-wargear-editor.is-pending::after { content:''; position:absolute; inset:0; border-radius:6px; background:linear-gradient(110deg,transparent 30%,rgba(199,154,58,.18) 50%,transparent 70%); background-size:220% 100%; animation:wgShimmer 1s linear infinite; }
    .wg-card:last-child { margin-bottom:0; }
    .wg-card-toggle { width:100%; display:flex; align-items:center; justify-content:space-between; gap:8px;
      background:none; border:none; cursor:pointer; padding:9px 11px; text-align:left; }
    .wg-card-toggle:hover .wg-card-chev { color:var(--gold-bright); }
    .wg-card-title { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--gold); }
    .wg-card-badge { font-family:'Oswald',sans-serif; font-size:10px; color:var(--parch-dim); border:1px solid var(--edge);
      border-radius:3px; padding:0 5px; margin-left:2px; }
    .wg-card-chev { color:var(--gold); font-size:11px; flex-shrink:0; }
    .wg-card-content { padding:0 11px 10px; border-top:1px solid rgba(44,42,53,.6); padding-top:8px; }
    .wg-radio em, .wg-stepper em { color:var(--gold-bright); font-style:normal; font-size:12px; }
    .wg-stepper { display:flex; align-items:center; justify-content:space-between; gap:12px; font-family:'EB Garamond',serif; font-size:14px; color:var(--parch); padding:3px 0; }
    .wg-stepper input { width:58px; background:var(--panel); border:1px solid var(--edge); color:var(--parch); font-family:'Oswald',sans-serif; font-size:14px; padding:3px 6px; text-align:center; }
    .wg-stepper input:focus { outline:none; border-color:rgba(199,154,58,.5); }
    .wg-cap { font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:.5px; text-transform:uppercase; color:var(--parch-dim); margin-bottom:5px; }
    .wg-array-sub { padding:2px 0 4px; }
    .wg-array-sub + .wg-array-sub { border-top:1px dashed rgba(44,42,53,.6); margin-top:6px; padding-top:8px; }
    .wg-array-mini { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:.4px; color:var(--parch); opacity:.8; margin-bottom:4px; }
    .wg-slots { display:flex; flex-wrap:wrap; gap:6px; }
    .wg-slot { background:var(--panel); border:1px solid var(--edge); color:var(--parch);
      font-family:'EB Garamond',serif; font-size:13px; padding:5px 8px; max-width:100%; }
    .wg-slot:focus { outline:none; border-color:rgba(199,154,58,.5); }
    .wg-model-row { display:flex; align-items:center; gap:10px; padding:2px 0; }
    .wg-model-lbl { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:.3px; color:var(--parch-dim);
      min-width:120px; flex-shrink:0; }
    .wg-model-row .wg-slot { flex:1; min-width:0; }
    .au-enh-editor { grid-column:1/-1; background:var(--ink-2); border:1px solid rgba(44,42,53,.7); padding:10px; margin-top:6px; }
    .au-enh-editor select { width:100%; background:var(--panel); border:1px solid var(--edge); color:var(--parch);
      font-family:'EB Garamond',serif; font-size:15px; padding:7px 10px; }
    .au-enh-editor select:focus { outline:none; border-color:rgba(199,154,58,.5); }

    /* Unit picker modal */
    .modal-backdrop { position:fixed; inset:0; z-index:50; background:rgba(5,5,7,.92);
      display:flex; align-items:flex-start; justify-content:center; padding:40px 20px; overflow-y:auto; }
    .modal-backdrop[hidden] { display:none; }
    .modal-box { background:var(--panel); border:1px solid rgba(199,154,58,.4);
      width:100%; max-width:680px; max-height:80vh; display:flex; flex-direction:column; }
    .modal-head { padding:16px 18px; border-bottom:1px solid var(--edge); display:flex; align-items:center; justify-content:space-between; }
    .modal-title { font-family:'Cinzel',serif; font-weight:700; font-size:15px; color:var(--gold-bright); margin:0; }
    .modal-close { background:none; border:none; color:var(--parch-dim); font-size:24px; cursor:pointer; line-height:1; padding:0; transition:color .2s; }
    .modal-close:hover { color:var(--gold); }
    .modal-search { padding:12px 16px; border-bottom:1px solid var(--edge); }
    .modal-search input { width:100%; background:var(--ink-2); border:1px solid var(--edge); color:var(--parch);
      font-family:'EB Garamond',serif; font-size:15px; padding:8px 12px; }
    .modal-search input:focus { outline:none; border-color:rgba(199,154,58,.5); }
    .modal-body { overflow-y:auto; flex:1; }
    .modal-role-head { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:2px; text-transform:uppercase;
      color:var(--gold); opacity:.6; padding:10px 16px 4px; position:sticky; top:0; background:var(--panel); z-index:1; }
    .modal-ally-head { color:var(--blood-bright); opacity:.75; border-top:1px solid rgba(150,40,40,.3); margin-top:6px; }
    .modal-ally-tag { font-family:'Oswald',sans-serif; font-size:9px; letter-spacing:.5px; text-transform:uppercase;
      color:var(--blood-bright); border:1px solid rgba(150,40,40,.5); border-radius:2px; padding:0 4px; margin-left:6px; }
    .modal-unit-row { display:flex; align-items:center; gap:12px; padding:9px 16px; cursor:pointer;
      border-bottom:1px solid rgba(44,42,53,.4); transition:background .15s; }
    .modal-unit-row:hover { background:rgba(199,154,58,.05); }
    .modal-unit-thumb { width:44px; height:44px; object-fit:cover; background:#0c0b10; border:1px solid var(--edge); flex-shrink:0; }
    .modal-unit-name { font-family:'Cinzel',serif; font-size:13px; font-weight:700; flex:1; color:var(--parch); }
    .modal-unit-owned { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:.5px; color:var(--parch-dim); }
    .modal-unit-pts { font-family:'Oswald',sans-serif; font-size:12px; color:var(--gold-bright); }

    /* Empty state */
    .ab-empty { text-align:center; padding:60px 30px; color:var(--parch-dim); }
    .ab-empty-icon { font-size:36px; color:var(--gold); opacity:.3; margin-bottom:14px; display:block; }
    .ab-empty h3 { font-family:'Cinzel',serif; font-size:16px; color:var(--parch); margin:0 0 8px; }
    .ab-empty p { font-style:italic; font-size:14px; line-height:1.5; margin:0; }
  </style>
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

    {% include "_topbar.html" %}

  <main id="view"></main>

  <!-- Unit picker modal -->
  <div class="modal-backdrop" id="unitPickerModal" hidden>
    <div class="modal-box">
      <div class="modal-head">
        <h2 class="modal-title">Add Unit to Army</h2>
        <button class="modal-close" onclick="closeUnitPicker()">&times;</button>
      </div>
      <div class="modal-search">
        <input id="pickerSearch" placeholder="Search units&hellip;" oninput="filterPicker(this.value)" autocomplete="off">
      </div>
      <div class="modal-body" id="pickerBody"></div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <img id="lightboxImg" alt="">
    <p id="lightboxCap"></p>
  </div>

  <footer class="footer">
    <p>For the Emperor. Unit data from Wahapedia. Army lists are stored locally in collection.db.</p>
  </footer>

  <script type="module" src="{{ url_for('static', filename='js/army_builder.js') }}"></script>
</body>
</html>
