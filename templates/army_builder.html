<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Army Builder · Codex Armorum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=EB+Garamond:ital@0;1&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/army-builder.css') }}">
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

    {% include "_topbar.html" %}

  <main id="view"></main>

  <!-- Unit picker modal -->
  <div class="modal-backdrop" id="unitPickerModal" hidden>
    <div class="modal-box">
      <div class="modal-head">
        <h2 class="modal-title">Add Unit to Army</h2>
        <button class="modal-close" onclick="closeUnitPicker()">&times;</button>
      </div>
      <div class="modal-search">
        <input id="pickerSearch" placeholder="Search units&hellip;" oninput="filterPicker(this.value)" autocomplete="off">
      </div>
      <div class="modal-body" id="pickerBody"></div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <img id="lightboxImg" alt="">
    <p id="lightboxCap"></p>
  </div>

  <footer class="footer">
    <p>For the Emperor. Unit data from Wahapedia. Army lists are stored locally in collection.db.</p>
  </footer>

  <script type="module" src="{{ url_for('static', filename='js/army_builder.js') }}"></script>
</body>
</html>
