<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Army Builder · Codex Armorum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=EB+Garamond:ital,wght@0,400;1,500&family=Oswald:wght@300;400;500;600;700&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/manual.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/army-builder.css') }}">
</head>
<body>
  <!-- apply saved reading mode before first paint (shared across all manual pages) -->
  <script>try{if(localStorage.getItem('caRules.theme')==='dark')document.body.setAttribute('data-rl-theme','dark');}catch(e){}</script>
  <!-- NOTE: no .scanlines overlay on this page — it would darken the light paper -->

  <div class="rl-chrome">
    {% include "_topbar.html" %}

    <!-- Quick strip: shown on every builder screen. The label + chips swap per
         view — "Army Builder" on the list, "Battle Roster" (+ FOC chips and the
         live points readout) on the roster detail view. -->
    <nav class="rl-strip" id="abStrip" aria-label="Army builder quick reference">
      <span class="rl-strip-label" id="abStripLabel">Army Builder</span>
      <span class="rl-strip-chips" id="abStripChips"></span>
      <span class="rl-strip-spacer"></span>
      <span class="rl-strip-note" id="abStripPts"></span>
      <button type="button" class="rl-strip-btn rl-strip-btn--ghost" id="abThemeBtn" title="Toggle light / dark reading mode"><span class="rl-theme-dot" aria-hidden="true"></span><span id="abThemeLabel">Dark</span></button>
    </nav>
  </div>

  <div class="rl-shell ab-shell" id="abShell">
    <main id="view"></main>
  </div>

  <!-- Shared scrim behind the drawer overlays below: the roster stays visible
       (dimmed) beside an open drawer; clicking the dimmed area closes it. -->
  <div class="po-scrim" id="poScrim" hidden onclick="closeAllOverlays()"></div>

  <!-- Add-unit picker: right-docked drawer on the manual (paper) surface,
       matching the reference app's dedicated add-unit screen. -->
  <div class="po-overlay po-manual" id="unitPickerModal" data-testid="unit-picker-panel" hidden>
    <div class="po-overlay-head">
      <h2 class="po-overlay-title" id="pickerTitle">Add Unit</h2>
      <span class="po-head-tag" id="pickerFaction"></span>
      <button class="po-close cb-back" type="button" onclick="closeUnitPicker()" aria-label="Close" title="Close">&times;</button>
    </div>
    <div class="po-search-wrap">
      <input class="po-search" id="pickerSearch" placeholder="Search units&hellip;" oninput="filterPicker(this.value)" autocomplete="off">
    </div>
    <div class="po-body" id="pickerBody"></div>
  </div>

  <!-- Command Bunker: faction/army reference drawer (Datasheets, Stratagems,
       Detachment Rules, Army Rules). Content is rendered fresh on each open.
       Keeps its dark styling (out of the manual reskin's scope). -->
  <div class="po-overlay" id="commandBunker" hidden></div>

  <!-- Edit Roster: name + Battle Size + Detachments, with the latter two as
       tap-through sub-screens. Content is rendered fresh on each open. The
       Detachments sub-screen gets the manual (paper) treatment via .po-manual,
       toggled by renderEditRosterInto; the rest stays dark. -->
  <div class="po-overlay" id="editRosterModal" data-testid="edit-roster-modal" hidden></div>

  <!-- Full datasheet card, overlaid like an image lightbox (click a unit's
       name in the roster / Command Bunker to open, X or backdrop to close). -->
  <div class="dsc-overlay" id="dsCardOverlay" data-testid="datasheet-card-overlay" hidden onclick="closeDatasheetCard()">
    <button class="dsc-overlay-close" type="button" onclick="closeDatasheetCard()" aria-label="Close" title="Close">&times;</button>
    <div class="dsc-overlay-body" id="dsCardBody" onclick="event.stopPropagation()"></div>
  </div>

  <!-- Wound roll chart: quick-reference table from core rules 05.02 (left-rail
       button opens, X or backdrop closes). Content rendered on first open. -->
  <div class="dsc-overlay" id="woundChartOverlay" data-testid="wound-chart-overlay" hidden onclick="closeWoundChart()">
    <button class="dsc-overlay-close" type="button" onclick="closeWoundChart()" aria-label="Close" title="Close">&times;</button>
    <div class="dsc-overlay-body wrc-body" id="woundChartBody" onclick="event.stopPropagation()"></div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <img id="lightboxImg" alt="">
    <p id="lightboxCap"></p>
  </div>

  {% include "_footer.html" %}

  <script type="module" src="{{ url_for('static', filename='js/army_builder.js') }}"></script>
</body>
</html>
