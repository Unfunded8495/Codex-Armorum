<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missions · Codex Armorum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=EB+Garamond:ital,wght@0,400;1,500&family=Oswald:wght@300;400;500;600;700&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/manual.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/missions.css') }}">
</head>
<body>
  <!-- apply saved reading mode before first paint (shared across all manual pages) -->
  <script>try{if(localStorage.getItem('caRules.theme')==='dark')document.body.setAttribute('data-rl-theme','dark');}catch(e){}</script>
  <!-- NOTE: no .scanlines overlay on this page — it would darken the light paper -->

  <div class="rl-chrome">
    {% include "_topbar.html" %}

    <nav class="rl-strip" id="mzStrip" aria-label="Mission deck quick reference">
      <span class="rl-strip-label">Mission Deck</span>
      <span class="rl-strip-chips" id="mzStripChips"></span>
      <span class="rl-strip-spacer"></span>
      <button type="button" class="rl-strip-btn rl-strip-btn--ghost" id="mzThemeBtn" title="Toggle light / dark reading mode"><span class="rl-theme-dot" aria-hidden="true"></span><span id="mzThemeLabel">Dark</span></button>
    </nav>
  </div>

  <div class="rl-shell" id="mzShell">
    <div class="mz-grid">
      <aside class="rl-side" aria-label="Mission contents">
        <div class="rl-search-wrap">
          <input type="search" id="mzSearch" class="rl-search" placeholder="Search missions&hellip;  ( / )"
                 autocomplete="off" spellcheck="false" aria-label="Search missions">
        </div>
        <div class="rl-side-head"><span>Mission Deck</span><span id="mzDeckCount"></span></div>
        <nav class="rl-toc" id="mzToc"></nav>
      </aside>

      <main class="rl-main mz-main" id="view">
        <div class="rl-loading">Shuffling the mission deck&hellip;</div>
      </main>
    </div>
  </div>

  <button class="rl-top-btn" id="mzTopBtn" title="Back to top" aria-label="Back to top">&#8679;</button>

  {% include "_footer.html" %}

  <!-- Enlarge-on-click overlay for the deployment / layout map images -->
  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
    <img id="lightboxImg" alt="">
    <p id="lightboxCap"></p>
  </div>

  <script type="module" src="{{ url_for('static', filename='js/missions.js') }}"></script>
</body>
</html>
